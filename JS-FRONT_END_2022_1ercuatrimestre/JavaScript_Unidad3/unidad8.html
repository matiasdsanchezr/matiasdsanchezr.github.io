<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="/styles/normalize.css" />
		<link rel="stylesheet" href="/styles/style.css" />
		<title>Document</title>
	</head>
	<body>
		<header><h1>Actividad Obligatoria: Formulario</h1></header>
		<form class="user-form" action="unidad8.html">
			<div class="user-form__item user-form__item-center">
				<h3 class="user-form__title">Ingreso al Sistema</h3>
			</div>

			<div class="user-form__item">
				<label for="user">Usuario: </label>
				<input type="text" name="user" id="user" />
			</div>

			<div class="user-form__item">
				<label for="password">Contraseña: </label>
				<input type="password" name="password" id="password" />
			</div>
			<!-- onclick="test()" -->
			<div class="user-form__item user-form__item-end">
				<button
					type="button"
					class="user-form__submit-button"
					id="submit-button"
				>
					Ingresar
				</button>
			</div>

			<div id="placeholder"></div>
		</form>

		<script src="scripts/control.js"></script>
	</body>
</html>
